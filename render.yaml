services:
  - type: web
    name: wealthia-backend
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ENABLE_BOT_POLLING
        value: "true"
      - key: WEBAPP_URL
        value: https://wealthia.github.io/wealthia/v5.html?v=2012
      - key: CHANNEL_URL
        sync: false
      - key: ALLOW_EARN_RESET
        value: "true"

  - type: worker
    name: wealthia-bot
    runtime: node
    rootDir: bot
    buildCommand: echo "no build"
    startCommand: node bot.js
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: WEBAPP_URL
        value: https://wealthia.github.io/wealthia/v5.html?v=2012
      - key: BOT_USERNAME
        value: WealthiaGameBot
      - key: CHANNEL_URL
        sync: false
      - key: BACKEND_URL
        value: https://wealthia-backend.onrender.com
      - key: STARS_WEBHOOK_SECRET
        sync: false
