services:
  - type: web
    name: wealthia-backend
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /ping
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: ALLOW_DEMO_SESSION
        value: "false"
      - key: ENABLE_BOT_POLLING
        value: "false"
      - key: WEBHOOK_BASE_URL
        value: https://wealthia-backend.onrender.com
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: STARS_TEST_MODE
        value: "false"
      - key: STARS_USE_POLLING
        value: "true"
      - key: WEBAPP_URL
        value: https://wealthia.github.io/wealthia/v5.html?v=2108
      - key: CHANNEL_URL
        sync: false
      - key: ALLOW_EARN_RESET
        value: "true"
      - key: ENABLE_DAILY_PUSH
        value: "true"
      - key: DAILY_PUSH_HOUR_UTC
        value: "10"
      - key: OWNER_TELEGRAM_ID
        sync: false

  - type: worker
    name: wealthia-bot
    runtime: node
    rootDir: bot
    buildCommand: echo "no build"
    startCommand: node bot.js
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: WEBAPP_URL
        value: https://wealthia.github.io/wealthia/v5.html?v=2108
      - key: BOT_USERNAME
        value: WealthiaGameBot
      - key: CHANNEL_URL
        sync: false
      - key: BACKEND_URL
        value: https://wealthia-backend.onrender.com
      - key: STARS_WEBHOOK_SECRET
        sync: false
      - key: DISABLE_BOT_POLLING
        value: "true"
      - key: OWNER_TELEGRAM_ID
        sync: false
