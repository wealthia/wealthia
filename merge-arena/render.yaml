services:
  - type: web
    name: merge-arena-api
    runtime: node
    rootDir: merge-arena/backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /ping
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: WEBAPP_URL
        value: https://wealthia.github.io/wealthia/merge-arena/app/?v=48
      - key: BOT_USERNAME
        value: MergeArenaBot
      - key: PLAY_BUTTON_TEXT
        value: Play MERGE ARENA
      - key: CHANNEL_URL
        value: https://t.me/weathia_official
      - key: DISABLE_BOT_POLLING
        value: "false"
