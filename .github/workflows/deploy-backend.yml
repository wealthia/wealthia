name: Deploy Backend to Render

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - "render.yaml"
      - ".github/workflows/deploy-backend.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        if: ${{ secrets.RENDER_DEPLOY_HOOK != '' }}
        run: curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
