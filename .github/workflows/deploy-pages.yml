name: Deploy GitHub Pages

# Site build_type is "legacy" (branch publish). The previous Actions
# deploy-pages job conflicted with legacy builds and left Pages errored.
# Keep this workflow manual-only until Pages is switched to "GitHub Actions".

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  noop:
    runs-on: ubuntu-latest
    steps:
      - name: Legacy Pages mode
        run: |
          echo "This repo uses legacy GitHub Pages (branch publish)."
          echo "Push to main publishes automatically. No Actions deploy needed."
